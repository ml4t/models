name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "docs"
  cancel-in-progress: true

jobs:
  build:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    env:
      DOCS_DEPLOY_KEY: ${{ secrets.DOCS_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev --extra docs

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Deploy to website repo
        if: ${{ env.DOCS_DEPLOY_KEY != '' }}
        uses: cpina/github-action-push-to-another-repository@v1.7.3
        env:
          SSH_DEPLOY_KEY: ${{ env.DOCS_DEPLOY_KEY }}
        with:
          source-directory: site/
          destination-github-username: ml4t
          destination-repository-name: website
          target-directory: static/docs/models/
          target-branch: main
          commit-message: "docs(models): update from ml4t/models@${{ github.sha }}"
          user-name: ml4t-bot
          user-email: bot@ml4trading.io
